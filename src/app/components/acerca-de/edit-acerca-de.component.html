<div class="px-6 py-5 my-5 text-center">
    <div class="col-lg-10 mx-auto border rounded-3">
        <div class="container" *ngIf="persona">
            <div>
                <form (ngSubmit)="onUpdate()" novalidate #f="ngForm">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" [(ngModel)]="persona.nombre"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" class="form-control" id="apellido" name="apellido"
                            [(ngModel)]="persona.apellido" required>
                    </div>
                    <div class="form-group">
                        <label for="titulo1">Titulo</label>
                        <input type="text" class="form-control" id="titulo1" name="titulo1"
                            [(ngModel)]="persona.titulo1" required>
                    </div>
                    <div class="form-group">
                        <label for="titulo2">Titulo</label>
                        <input type="text" class="form-control" id="titulo2" name="titulo2"
                            [(ngModel)]="persona.titulo2" required>
                    </div>
                    <div class="form-group">
                        <label for="acercaDe">Acerca de mi</label>
                        <input type="text" class="form-control" id="acercaDe" name="acercaDe"
                            [(ngModel)]="persona.acercaDe" required>
                    </div>
                    <div class="form-group">
                        <label for="img">Imagen</label>
                        <input type="file" class="form-control" id="img" name="img"
                            [(ngModel)]="persona.img"  required (change)="uploadImage($event)" accept=".jpg , .jpeg ,png" >
                    </div>
                    <div class="imagen">
                        <img [src]="imageService.url" width="30%" height="30%">
                    </div>
                    <button class="btn">
                        Modificar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
