<div class="px-6 py-5 my-5 text-center">
    <div class="col-lg-10 mx-auto border rounded-3">
        <div class="container" *ngIf="proyecto">
            <div>
                <form (ngSubmit)="onUpdate()" novalidate #f="ngForm">
                    <div class="form-group">
                        <label for="nombreProy">Nombre</label>
                        <input type="text" class="form-control" id="nombreProy" name="nombreProy"
                            [(ngModel)]="proyecto.nombreProy" required>
                    </div>
                    <div class="form-group">
                        <label for="descripcionProy">Descripcion</label>
                        <input type="text" class="form-control" id="descripcionProy" name="descripcionProy"
                            [(ngModel)]="proyecto.descripcionProy" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="direccion">Link</label>
                        <input type="text" class="form-control" id="direccion" name="direccion" [(ngModel)]="proyecto.direccion"
                            required>
                    </div>

                    <!-- <div class="form-group">
                        <label for="imagenP">Imagen</label>
                        <input type="file" class="form-control" id="imagenP" name="imagenP" [(ngModel)]="proyecto.imagenP"
                            (change)="uploadImage($event)" accept=".jpg , .jpeg ,png">
                    </div>

                    <div class="imagen">
                        <img [src]="imageService.url" width="30%" height="30%">
                    </div> -->

                    <button class="btn">
                        Modificar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
