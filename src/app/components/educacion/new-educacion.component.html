<div class="px-6 py-5 my-5 text-center">
    <div class="col-lg-10 mx-auto border rounded-3">
        <div class="container">
            <div class="row">
                <div>
                    <form (ngSubmit)="onCreate()" novalidate #f="ngForm">

                        <div class="form-group">
                            <label for="nombreEdu">Nombre educación</label>
                            <input type="text" class="form-control" id="nombreEdu" name="nombreEdu"
                                [(ngModel)]="nombreEdu" required>
                        </div>

                        <div class="form-group">
                            <label for="descripcionEdu">Descripcion de educación</label>
                            <input type="text" class="form-control" id="descripcionEdu" name="descripcionEdu"
                                [(ngModel)]="descripcionEdu" required>
                        </div>
                        <button class="btn">Cargar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
