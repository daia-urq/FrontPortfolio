<div class="px-6 py-5 my-5 text-center">
    <div class="col-lg-10 mx-auto border rounded-3">
        <div class="container" *ngIf="expLab">
            <div class="row">
                <div>
                    <form (ngSubmit)="onUpdate()" novalidate #f="ngForm">
                        <div class="form-group">
                            <label for="nombreExp">Nombre experiencia</label>
                            <input type="text" class="form-control" id="nombreExp" name="nombreExp" [(ngModel)]="expLab.nombreExp" required>
                        </div>
                        <div class="form-group">
                            <label for="descripcionExp">Descripción</label>
                            <input type="text" class="form-control" id="descripcionExp" name="descripcionExp" [(ngModel)]="expLab.descripcionExp" required>
                        </div>
                        <button class="btn">
                            Modificar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
