<div class="container">
    <div class="titulo">
        <h3>Experiencia laboral</h3>
    </div>
    <div class ="col-lg-2">
        <button type="button" class="btn" [routerLink]="['/nuevaexp']" *ngIf="isLogged">Cargar experiencia </button>
    </div>

    <div class="card" *ngFor="let Experiencia of experiencia">
        <div class="card-header">
            <div class="row">
                <div class="col-sm-10">
                    <h4>{{Experiencia.nombreExp}}</h4>
                </div>
                <div  class="col-sm-2" *ngIf="isLogged">
                    <button type="button" class="button" [routerLink]="['/editexp',Experiencia.id]">
                        <i class="bi bi-pencil-square"></i></button>
                    <button class="button" type="button" (click)="delete(Experiencia.id)">
                        <i class="bi bi-trash3"></i></button>
                </div>               
            </div>
        </div>   
       
        <div class="card-body">
            <blockquote class="blockquote mb-0">
                <p>{{Experiencia.descripcionExp}}</p>           
            </blockquote>
        </div>
    </div> 
</div>
