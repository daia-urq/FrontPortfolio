<div class="px-6 py-5 my-5 text-center">
    <div class="col-lg-10 mx-auto border rounded-3">
        <div class="container" *ngIf="skills">
            <div class="row">
                <div>
                    <form (ngSubmit)="onUpdate()" novalidate #f="ngForm">
                        <div class="form-group">
                            <label for="nombreSkill">Nombre skill</label>
                            <input type="text" class="form-control" id="nombreSkill" name="nombreSkill" [(ngModel)]="skills.nombreSkill" required>
                        </div>
                        <div class="form-group">
                            <label for="porcentaje">Porcentaje</label>
                            <input type="text" class="form-control" id="porcentaje" name="porcentaje" [(ngModel)]="skills.porcentaje" required>
                        </div>
                        <button class="btn">
                            Modificar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
