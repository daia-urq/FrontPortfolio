<div class="px-6 py-5 my-5 text-center">
    <div class="col-lg-10 mx-auto border rounded-3">
        <div class="container">
            <div class="row">
                <div>
                    <form (ngSubmit)="onCreate()" novalidate #f="ngForm">

                        <div class="form-group">
                            <label for="nombreSkill">Nombre skill</label>
                            <input type="text" class="form-control" id="nombreSkill" name="nombreSkill" [(ngModel)]="nombreSkill" required>
                        </div>

                        <div class="form-group">
                            <label for="porcentaje">Porcentaje de skill</label>
                            <input type="number" class="form-control" id="porcentaje" name="porcentaje"  min="1" max="100"
                                [(ngModel)]="porcentaje" required>
                        </div>
                        <button class="btn">Cargar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
